<!DOCTYPE html>
<html>
<head>
    <title>Edit Shipment</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="form-container">

    <h2>Edit Shipment</h2>

    <form method="POST">
        <input type="text" name="customer" value="{{ shipment[1] }}" required>

        <input type="text" name="product" value="{{ shipment[2] }}" required>

        <textarea name="address" required>{{ shipment[3] }}</textarea>

        <select name="status" required>
            <option value="Pending" {% if shipment[4] == "Pending" %}selected{% endif %}>Pending</option>
            <option value="In Transit" {% if shipment[4] == "In Transit" %}selected{% endif %}>In Transit</option>
            <option value="Delivered" {% if shipment[4] == "Delivered" %}selected{% endif %}>Delivered</option>
        </select>

        <button type="submit">Update Shipment</button>
    </form>

    <a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
